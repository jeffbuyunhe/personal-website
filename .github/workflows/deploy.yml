name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/jeffbuyunhe/personal-website-backend
  FRONTEND_IMAGE: ghcr.io/jeffbuyunhe/personal-website-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/app/backend ~/app/frontend
            curl -fsSL "https://raw.githubusercontent.com/jeffbuyunhe/personal-website/main/docker-compose.yml" -o ~/app/docker-compose.yml
            echo "${{ secrets.ENV_BACKEND }}" > ~/app/backend/.env
            echo "${{ secrets.ENV_FRONTEND }}" > ~/app/frontend/.env
            sudo fuser -k 3000/tcp || true
            sudo fuser -k 3001/tcp || true
            cd ~/app
            docker compose pull
            docker compose up -d --remove-orphans
